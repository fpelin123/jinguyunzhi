<style>
:root {
  --bg: #0A0A0A; --surface: rgba(10,10,10,0.7);

}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--white);
  font-family: 'Noto Sans SC', sans-serif;
  overflow-x: hidden;

}
h1, h2, h3, h4, h5, h6, .font-display {
  font-family: 'Cabinet Grotesk', 'Noto Sans SC', sans-serif;
  font-weight: 700; letter-spacing: -0.03em;
}
.grain-overlay {
  position: fixed; inset:0; z-index:100;
  pointer-events: none; opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
}
.mesh-bg {
  position: fixed; inset:0;
  pointer-events: none; z-index:0;
  overflow: hidden;
}
.mesh-bg .orb {
  position: absolute; border-radius: 50%;
  filter: blur(100px); opacity: 0.3;
}
.mesh-bg .orb-1 { width:700px;height:700px;background:radial-gradient(circle,rgba(77,212,153,0.5),rgba(18,90,68,0.15));top:-250px;right:-100px;animation:orbFloat1 24s ease-in-out infinite;}
.mesh-bg .orb-2 { width:550px;height:550px;background:radial-gradient(circle,rgba(0,150,136,0.25),rgba(0,100,90,0.08));bottom:20%;left:-200px;animation:orbFloat2 28s ease-in-out infinite;}
.mesh-bg .orb-3 { width:450px;height:450px;background:radial-gradient(circle,rgba(77,212,153,0.2),transparent);top:45%;right:-150px;animation:orbFloat3 20s ease-in-out infinite;}
.mesh-bg .orb-4 { width:350px;height:350px;background:radial-gradient(circle,rgba(0,200,180,0.15),transparent);bottom:-100px;right:25%;animation:orbFloat1 26s ease-in-out infinite reverse;}
@keyframes orbFloat1 {0%,100%{transform:translate(0,0)scale(1)}33%{transform:translate(80px,-50px)scale(1.12)}66%{transform:translate(-40px,50px)scale(0.92)}}
@keyframes orbFloat2 {0%,100%{transform:translate(0,0)scale(1)}50%{transform:translate(-60px,70px)scale(1.18)}}
@keyframes orbFloat3 {0%,100%{transform:translate(0,0)scale(1)}50%{transform:translate(50px,-40px)scale(1.08)}}
.glass {background:var(--glass-bg);backdrop-filter:blur(24px)saturate(1.4);-webkit-backdrop-filter:blur(24px)saturate(1.4);border:1px solid var(--glass-border);border-radius:16px;box-shadow:0 4px 32px rgba(0,0,0,0.4);}
.glass-strong {background:rgba(255,255,255,0.055);backdrop-filter:blur(32px)saturate(1.6);border:1px solid var(--glass-border-strong);border-radius:24px;box-shadow:0 8px 48px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.08);}
.section-label {font-family:'Cabinet Grotesk',sans-serif;font-size:0.7rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--emerald);opacity:0.7;}
.section-title {font-size:clamp(1.6rem,3.2vw,2.8rem);font-weight:800;letter-spacing:-0.04em;line-height:1.15;}
.btn-glow {display:inline-flex;align-items:center;gap:12px;padding:16px 36px;background:var(--emerald);color:#0A0A0A;font-family:'Cabinet Grotesk','Noto Sans SC',sans-serif;font-weight:600;font-size:1.05rem;border:none;border-radius:40px;cursor:pointer;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);text-decoration:none;}
.btn-glow:hover {transform:translateY(-2px) scale(1.03);}
.btn-outline {display:inline-flex;align-items:center;gap:10px;padding:12px 24px;background:transparent;color:var(--white);border:1px solid rgba(255,255,255,0.1);border-radius:40px;font-family:'Cabinet Grotesk','Noto Sans SC',sans-serif;font-weight:500;font-size:0.9rem;cursor:pointer;text-decoration:none;transition:all 0.35s cubic-bezier(0.22,1,0.36,1);}
.btn-outline:hover {border-color:var(--emerald);color:var(--emerald);background:rgba(77,212,153,0.06);transform:translateY(-1px);}
.reveal {opacity:0;transform:translateY(40px) scale(0.98);filter:blur(4px);transition:opacity 0.9s cubic-bezier(0.22,1,0.36,1),transform 0.9s cubic-bezier(0.22,1,0.36,1),filter 0.9s cubic-bezier(0.22,1,0.36,1);}
.reveal.visible {opacity:1;transform:translateY(0) scale(1);filter:blur(0);}
.reveal-delay-1 {transition-delay:0.08s;}
.reveal-delay-2 {transition-delay:0.16s;}
.reveal-delay-3 {transition-delay:0.24s;}
.reveal-delay-4 {transition-delay:0.32s;}

/* Filter bar */
.filter-btn {font-family:'Cabinet Grotesk','Noto Sans SC',sans-serif;font-size:0.8rem;font-weight:500;padding:8px 18px;border-radius:40px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.3s ease;}

/* Lightbox */
.lightbox {
  position: fixed; inset:0; z-index:99999;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(16px);
  display: flex; align-items: center; justify-content: center;

}
.lightbox.open { opacity: 1; pointer-events: auto; }
.lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 16px; box-shadow: 0 24px 80px rgba(0,0,0,0.8); }
.lightbox-close {
  position: absolute; top: 24px; right: 24px;
  width: 48px; height: 48px;
  border-radius: 50%; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  color: white; font-size: 1.4rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.3s ease;
}
.lightbox-close:hover { background: rgba(255,255,255,0.1); transform: rotate(90deg); }
.lightbox-info {
  position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
  text-align: center; color: rgba(255,255,255,0.6); font-size: 0.85rem;
  max-width: 600px;
}
.sticky-phone {display:none;position:fixed;bottom:24px;left:24px;z-index:9997;background:rgba(10,10,10,0.85);backdrop-filter:blur(12px);border:1px solid rgba(77,212,153,0.15);border-radius:40px;padding:10px 20px;color:var(--emerald);text-decoration:none;font-size:0.85rem;font-weight:600;box-shadow:0 4px 24px rgba(0,0,0,0.5);align-items:center;gap:8px;transition:all 0.3s ease;animation:phonePulse 2s ease-in-out infinite;}
.sticky-phone:hover{border-color:var(--emerald);transform:translateY(-2px);}
@keyframes phonePulse{0%,100%{box-shadow:0 4px 24px rgba(0,0,0,0.5)}50%{box-shadow:0 4px 24px rgba(0,0,0,0.5),0 0 20px rgba(77,212,153,0.15)}}
@media(max-width:768px){.sticky-phone{display:flex;}}
.scroll-progress{position:fixed;top:0;left:0;z-index:99999;width:0%;height:2px;background:linear-gradient(90deg,var(--emerald),rgba(77,212,153,0.3));transition:width 0.1s linear;pointer-events:none;}
.back-to-top{position:fixed;bottom:32px;right:32px;z-index:9998;width:48px;height:48px;border-radius:50%;background:rgba(10,10,10,0.75);backdrop-filter:blur(8px);border:1px solid rgba(77,212,153,0.2);color:var(--emerald);display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transform:translateY(20px);pointer-events:none;transition:opacity 0.4s ease,transform 0.4s cubic-bezier(0.22,1,0.36,1);box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.back-to-top.visible{opacity:1;transform:translateY(0);pointer-events:auto;}
.back-to-top:hover{border-color:rgba(77,212,153,0.5);transform:translateY(-3px);}

/* Nav bar */
.nav-bar{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 0;background:rgba(10,10,10,0.8);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.04);}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;}

</style>
</head>

<script>
(function(){
'use strict';

const works = [
  {img:'/showcase_images/showcase_01.png',title:'云巅独步',author:'初级 · 张同学',category:'wuxia',tools:'Midjourney + ComfyUI'},
  {img:'/showcase_images/showcase_02.png',title:'灵源觉醒',author:'中级 · 李同学',category:'wuxia',tools:'ComfyUI + Sora'},
  {img:'/showcase_images/showcase_03.png',title:'赛博大同2049',author:'中级 · 王同学',category:'cyberpunk',tools:'Midjourney + After Effects'},
  {img:'/showcase_images/showcase_04.png',title:'钢铁苍穹',author:'高级 · 陈同学',category:'sci-fi',tools:'ComfyUI + Blender'},
  {img:'/showcase_images/showcase_05.png',title:'天宫盛景',author:'初级 · 刘同学',category:'wuxia',tools:'Midjourney'},
  {img:'/showcase_images/showcase_06.png',title:'竹林惊鸿',author:'中级 · 赵同学',category:'wuxia',tools:'DALL·E + ComfyUI'},
  {img:'/showcase_images/showcase_07.png',title:'灵域幻境',author:'高级 · 孙同学',category:'fantasy',tools:'ComfyUI + Runway'},
  {img:'/showcase_images/showcase_08.png',title:'未来战士',author:'高级 · 周同学',category:'sci-fi',tools:'Midjourney + Premiere Pro'},
];

function getImagePath(index) {
  const imgDir = '/showcase_images';
  const patterns = ['jpg','png','jpeg','webp'];
  return imgDir + '/showcase_' + String(index).padStart(2,'0') + '.png';
}

function initShowcase() {
  const grid = document.getElementById('showcaseGrid');
  if (!grid) return;

  if (works.length === 0) {
    grid.innerHTML = '<div class="col-span-full text-center py-20"><div class="text-4xl mb-4"><i class="ph ph-images text-[rgba(255,255,255,0.1)]"></i></div><p class="text-sm text-[rgba(255,255,255,0.3)]">作品图片正在生成中... 请稍后刷新页面查看</p></div>';
    return;
  }

  renderWorks('all');
}

function renderWorks(filter) {
  const grid = document.getElementById('showcaseGrid');
  const filtered = filter === 'all' ? works : works.filter(w => w.category === filter);

  grid.innerHTML = filtered.map((w, i) => {
    const delay = (i % 4) * 0.08;
    return '<div class="showcase-item glass rounded-2xl border border-[rgba(255,255,255,0.04)] reveal" style="transition-delay:' + delay + 's" data-category="' + w.category + '" onclick="openLightbox(\'' + w.img + '\',\'' + w.title + '\',\'' + w.author + '\',\'' + w.tools + '\')">' +
      '<div class="relative" style="aspect-ratio:16/9;overflow:hidden;border-radius:16px;">' +
        '<img src="' + w.img + '" alt="' + w.title + '" loading="lazy" class="showcase-img" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML=\'<div style=\\\'display:flex;align-items:center;justify-content:center;height:100%;background:rgba(255,255,255,0.02);color:rgba(255,255,255,0.15);font-size:0.75rem;\\\'><i class=\\\'ph ph-image\\\' style=\\\'font-size:2rem;opacity:0.3;\\\'></i></div>\'">' +
        '<div class="showcase-overlay">' +
          '<div class="text-sm font-medium font-display">' + w.title + '</div>' +
          '<div class="text-xs text-[rgba(255,255,255,0.4)] mt-0.5">' + w.author + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  // Trigger reveal
  requestAnimationFrame(() => {
    grid.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
  });
}

// Filter
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    renderWorks(this.dataset.filter);
  });
});

// Lightbox
window.openLightbox = function(img, title, author, tools) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightboxImg').src = img;
  document.getElementById('lightboxInfo').textContent = title + ' · ' + author + ' · ' + tools;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
};
window.closeLightbox = function() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
};
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeLightbox(); }
});

// Scroll reveal
const revealEls = document.querySelectorAll('.reveal');
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });
revealEls.forEach(el => observer.observe(el));

// Progress + back to top
const progressBar = document.getElementById('scrollProgress');
const backBtn = document.getElementById('backToTop');
window.addEventListener('scroll', () => {
  const h = document.documentElement.scrollHeight - window.innerHeight;
  progressBar.style.width = h > 0 ? (window.scrollY / h * 100) + '%' : '0%';
  backBtn.classList.toggle('visible', window.scrollY > 300);
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
}, { passive: true });

// Store works data for later injection
window.showcaseWorks = works;
window.updateShowcaseWorks = function(newWorks) {
  works.length = 0;
  newWorks.forEach(w => works.push(w));
  initShowcase();
};

initShowcase();
})();
</script>
